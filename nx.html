<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis.css" type="text/css" />
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.js"> </script>
<center>
<h1></h1>
</center>

<!-- <link rel="stylesheet" href="../node_modules/vis/dist/vis.min.css" type="text/css" />
<script type="text/javascript" src="../node_modules/vis/dist/vis.js"> </script>-->

<style type="text/css">

        #mynetwork {
            width: 1000px;
            height: 1000px;
            background-color: #ffffff;
            border: 1px solid lightgray;
            position: relative;
            float: left;
        }

        

        
        #config {
            float: left;
            width: 400px;
            height: 600px;
        }
        

        
        /* position absolute is important and the container has to be relative or absolute as well. */
	    div.popup {
            position:absolute;
            top:0px;
            left:0px;
            display:none;
            background-color:#f5f4ed;
            -moz-border-radius: 3px;
            -webkit-border-radius: 3px;
            border-radius: 3px;
            border: 1px solid #808074;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
	    }

	    /* hide the original tooltip */
	    .vis-network-tooltip {
	      display:none;
	    }
        
</style>

</head>

<body>
<div id = "mynetwork"></div>


<div id = "config"></div>

<script type="text/javascript">

    // initialize global variables.
    var edges;
    var nodes;
    var network; 
    var container;
    var options, data;

    
    // This method is responsible for drawing the graph, returns the drawn network
    function drawGraph() {
        var container = document.getElementById('mynetwork');
        
        

        // parsing and collecting nodes and edges from the python
        nodes = new vis.DataSet([{"group": 3, "id": "sequencesE/PPT_23", "label": "ORT49016.1_1_21", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MNAPDARGLQVGTGNTQINNF)\"\u003eMNAPDARGLQVGTGNTQINNF\u003c/a\u003e"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1064", "label": "int:1064(NI)", "shape": "box", "size": 10, "title": "No information"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1065", "label": "int:1065(NI)", "shape": "box", "size": 10, "title": "No information"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1066", "label": "int:1066(NI)", "shape": "box", "size": 10, "title": "No information"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1067", "label": "int:1067(NI)", "shape": "box", "size": 10, "title": "No information"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1068", "label": "int:1068(NI)", "shape": "box", "size": 10, "title": "No information"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1069", "label": "int:1069(NI)", "shape": "box", "size": 10, "title": "No information"}, {"color": "#bfbfbf", "group": 2, "id": "interactionsE/1070", "label": "int:1070(NI)", "shape": "box", "size": 10, "title": "No information"}, {"group": 4, "id": "amyloidsE/BASS3", "label": "BASS3", "shape": "dot", "size": 10}, {"group": 5, "id": "organismsE/Frankia_sp_KB5", "label": "Frankia_sp_KB5", "lifestyle": "symbiont roslin", "pH": "nan", "shape": "dot", "size": 10, "temperature": "ok. 25"}, {"group": 6, "id": "temperaturesE/mesophilic", "label": "mesophilic", "range": "11\u00b0C-45\u00b0C", "shape": "dot", "size": 10}]);
        edges = new vis.DataSet([{"from": "sequencesE/PPT_23", "to": "interactionsE/1064", "weight": 1}, {"from": "sequencesE/PPT_23", "to": "interactionsE/1065", "weight": 1}, {"from": "sequencesE/PPT_23", "to": "interactionsE/1066", "weight": 1}, {"from": "sequencesE/PPT_23", "to": "interactionsE/1067", "weight": 1}, {"from": "sequencesE/PPT_23", "to": "interactionsE/1068", "weight": 1}, {"from": "sequencesE/PPT_23", "to": "interactionsE/1069", "weight": 1}, {"from": "sequencesE/PPT_23", "to": "interactionsE/1070", "weight": 1}, {"from": "amyloidsE/BASS3", "to": "sequencesE/PPT_23", "weight": 1}, {"from": "organismsE/Frankia_sp_KB5", "to": "amyloidsE/BASS3", "weight": 1}, {"from": "temperaturesE/mesophilic", "to": "organismsE/Frankia_sp_KB5", "weight": 1}]);

        // adding nodes and edges to the graph
        data = {nodes: nodes, edges: edges};

        var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": false,
            "type": "continuous"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};
        
        

        
        // if this network requires displaying the configure window,
        // put it in its div
        options.configure["container"] = document.getElementById("config");
        

        network = new vis.Network(container, data, options);
	 
        
        // make a custom popup
        var popup = document.createElement("div");
        popup.className = 'popup';
        popupTimeout = null;
        popup.addEventListener('mouseover', function () {
            console.log(popup)
            if (popupTimeout !== null) {
                clearTimeout(popupTimeout);
                popupTimeout = null;
            }
        });
        popup.addEventListener('mouseout', function () {
            if (popupTimeout === null) {
                hidePopup();
            }
        });
        container.appendChild(popup);


        // use the popup event to show
        network.on("showPopup", function (params) {
            showPopup(params);
        });

        // use the hide event to hide it
        network.on("hidePopup", function (params) {
            hidePopup();
        });


        // hiding the popup through css
        function hidePopup() {
            popupTimeout = setTimeout(function () { popup.style.display = 'none'; }, 500);
        }

        // showing the popup
        function showPopup(nodeId) {
            // get the data from the vis.DataSet
            var nodeData = nodes.get([nodeId]);
            popup.innerHTML = nodeData[0].title;

            // get the position of the node
            var posCanvas = network.getPositions([nodeId])[nodeId];

            // get the bounding box of the node
            var boundingBox = network.getBoundingBox(nodeId);

            //position tooltip:
            posCanvas.x = posCanvas.x + 0.5 * (boundingBox.right - boundingBox.left);

            // convert coordinates to the DOM space
            var posDOM = network.canvasToDOM(posCanvas);

            // Give it an offset
            posDOM.x += 10;
            posDOM.y -= 20;

            // show and place the tooltip.
            popup.style.display = 'block';
            popup.style.top = posDOM.y + 'px';
            popup.style.left = posDOM.x + 'px';
        }
        


        

        return network;

    }

    drawGraph();

</script>
</body>
</html>
