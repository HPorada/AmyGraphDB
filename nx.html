<html>
<head>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.js"> </script>
<center>
<h1></h1>

<style type="text/css">

        #mynetwork {
            width: 1000px;
            height: 1000px;
            background-color: #ffffff;
            border: 1px solid lightgray;
            position: relative;
            float: left;
        }

        

        
        #config {
            float: left;
            width: 400px;
            height: 600px;
        }
        

        
        /* position absolute is important and the container has to be relative or absolute as well. */
	    div.popup {
            position:absolute;
            top:0px;
            left:0px;
            display:none;
            background-color:#f5f4ed;
            -moz-border-radius: 3px;
            -webkit-border-radius: 3px;
            border-radius: 3px;
            border: 1px solid #808074;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
	    }

	    /* hide the original tooltip */
	    .vis-network-tooltip {
	      display:none;
	    }
        
</style>

</head>

<body>
<div id = "mynetwork"></div>


<div id = "config"></div>

<script type="text/javascript">

    // initialize global variables.
    var edges;
    var nodes;
    var network; 
    var container;
    var options, data;

    
    // This method is responsible for drawing the graph, returns the drawn network
    function drawGraph() {
        var container = document.getElementById('mynetwork');
        
        

        // parsing and collecting nodes and edges from the python
        nodes = new vis.DataSet([{"group": 3, "id": "sequencesE/20", "label": "seq:20", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MEFVAKLFKFFKDLLGKFLGNN)\"\u003eMEFVAKLFKFFKDLLGKFLGNN\u003c/a\u003e"}, {"color": "#0bd11f", "group": 2, "id": "interactionsE/42", "label": "int:42(NI)", "shape": "triangle", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b13 as interactor and PSM\u03b11 as interactee were used)\"\u003ePSM\u03b13 as interactor and PSM\u03b11 as interactee were used\u003c/a\u003e"}, {"color": "#0bd11f", "group": 2, "id": "interactionsE/46", "label": "int:46(NI)", "shape": "triangle", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b13 as interactor and PSM\u03b21 as interactee were used )\"\u003ePSM\u03b13 as interactor and PSM\u03b21 as interactee were used \u003c/a\u003e"}, {"color": "#0bd11f", "group": 2, "id": "interactionsE/48", "label": "int:48(NI)", "shape": "triangle", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b11 as interactor and PSM\u03b13 as interactee were used)\"\u003ePSM\u03b11 as interactor and PSM\u03b13 as interactee were used\u003c/a\u003e"}, {"color": "#0bd11f", "group": 2, "id": "interactionsE/49", "label": "int:49(NI)", "shape": "triangle", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b22 as interactor and PSM\u03b13 as interactee were used )\"\u003ePSM\u03b22 as interactor and PSM\u03b13 as interactee were used \u003c/a\u003e"}, {"color": "#e30000", "group": 2, "id": "interactionsE/50", "label": "int:50(NI)", "shape": "square", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b21 as interactor and PSM\u03b13 as interactee were used )\"\u003ePSM\u03b21 as interactor and PSM\u03b13 as interactee were used \u003c/a\u003e"}, {"color": "#e30000", "group": 2, "id": "interactionsE/53", "label": "int:53(NI)", "shape": "triangleDown", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b13 as interactor and PSM\u03b22 as interactee were used )\"\u003ePSM\u03b13 as interactor and PSM\u03b22 as interactee were used \u003c/a\u003e"}, {"color": "#e30000", "group": 2, "id": "interactionsE/56", "label": "int:56(NI)", "shape": "square", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b13 as interactor and PSM\u03b12 as interactee were used)\"\u003ePSM\u03b13 as interactor and PSM\u03b12 as interactee were used\u003c/a\u003e"}, {"color": "#e30000", "group": 2, "id": "interactionsE/59", "label": "int:59(NI)", "shape": "square", "size": 10, "title": "\u003ca href=\"javascript:alert(PSM\u03b13 as interactor and PSM\u03b14 as interactee were used)\"\u003ePSM\u03b13 as interactor and PSM\u03b14 as interactee were used\u003c/a\u003e"}, {"color": "#e30000", "group": 2, "id": "interactionsE/85", "label": "int:85(N)", "shape": "square", "size": 10, "title": "\u003ca href=\"javascript:alert(nan)\"\u003enan\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/PSMalpha3", "label": "PSM\u03b13", "shape": "dot", "size": 10}, {"group": 3, "id": "sequencesE/21", "label": "seq:21", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MGIIAGIIKVIKSLIEQFTGK)\"\u003eMGIIAGIIKVIKSLIEQFTGK\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/PSMalpha1", "label": "PSM\u03b11", "shape": "dot", "size": 10}, {"group": 3, "id": "sequencesE/22", "label": "seq:22", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MEGLFNAIKDTVTAAINNDGAKLGTSIVSIVENGVGLLGKLFGF)\"\u003eMEGLFNAIKDTVTAAINNDGAKLGTSIVSIVENGVGLLGKLFGF\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/PSMbeta1", "label": "PSM\u03b21", "shape": "dot", "size": 10}, {"group": 3, "id": "sequencesE/23", "label": "seq:23", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MTGLAEAIANTVQAAQQHDSVKLGTSIVDIVANGVGLLGKLFGF)\"\u003eMTGLAEAIANTVQAAQQHDSVKLGTSIVDIVANGVGLLGKLFGF\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/PSMbeta2", "label": "PSM\u03b22", "shape": "dot", "size": 10}, {"group": 3, "id": "sequencesE/24", "label": "seq:24", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MGIIAGIIKFIKGLIEKFTGK)\"\u003eMGIIAGIIKFIKGLIEKFTGK\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/PSMalpha2", "label": "PSM\u03b12", "shape": "dot", "size": 10}, {"group": 3, "id": "sequencesE/25", "label": "seq:25", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MAIVGTIIKIIKAIIDIFAK)\"\u003eMAIVGTIIKIIKAIIDIFAK\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/PSMalpha4", "label": "PSM\u03b14", "shape": "dot", "size": 10}, {"group": 3, "id": "sequencesE/36", "label": "seq:36", "shape": "dot", "size": 10, "title": "\u003ca href=\"javascript:alert(MAQDIISTIGDLVKWIIDTVNKFTKK)\"\u003eMAQDIISTIGDLVKWIIDTVNKFTKK\u003c/a\u003e"}, {"group": 4, "id": "amyloidsE/delta-toxin", "label": "\u03b4-toxin", "shape": "dot", "size": 10}]);
        edges = new vis.DataSet([{"from": "sequencesE/20", "to": "interactionsE/42", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/46", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/48", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/49", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/50", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/53", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/56", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/59", "weight": 1}, {"from": "sequencesE/20", "to": "interactionsE/85", "weight": 1}, {"from": "amyloidsE/PSMalpha3", "to": "sequencesE/20", "weight": 1}, {"from": "sequencesE/21", "to": "interactionsE/42", "weight": 1}, {"from": "sequencesE/21", "to": "interactionsE/48", "weight": 1}, {"from": "amyloidsE/PSMalpha1", "to": "sequencesE/21", "weight": 1}, {"from": "sequencesE/22", "to": "interactionsE/46", "weight": 1}, {"from": "sequencesE/22", "to": "interactionsE/50", "weight": 1}, {"from": "amyloidsE/PSMbeta1", "to": "sequencesE/22", "weight": 1}, {"from": "sequencesE/23", "to": "interactionsE/49", "weight": 1}, {"from": "sequencesE/23", "to": "interactionsE/53", "weight": 1}, {"from": "amyloidsE/PSMbeta2", "to": "sequencesE/23", "weight": 1}, {"from": "sequencesE/24", "to": "interactionsE/56", "weight": 1}, {"from": "amyloidsE/PSMalpha2", "to": "sequencesE/24", "weight": 1}, {"from": "sequencesE/25", "to": "interactionsE/59", "weight": 1}, {"from": "amyloidsE/PSMalpha4", "to": "sequencesE/25", "weight": 1}, {"from": "sequencesE/36", "to": "interactionsE/85", "weight": 1}, {"from": "amyloidsE/delta-toxin", "to": "sequencesE/36", "weight": 1}]);

        // adding nodes and edges to the graph
        data = {nodes: nodes, edges: edges};

        var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": false,
            "type": "continuous"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};
        
        

        
        // if this network requires displaying the configure window,
        // put it in its div
        options.configure["container"] = document.getElementById("config");
        

        network = new vis.Network(container, data, options);
	 
        
        // make a custom popup
        var popup = document.createElement("div");
        popup.className = 'popup';
        popupTimeout = null;
        popup.addEventListener('mouseover', function () {
            console.log(popup)
            if (popupTimeout !== null) {
                clearTimeout(popupTimeout);
                popupTimeout = null;
            }
        });
        popup.addEventListener('mouseout', function () {
            if (popupTimeout === null) {
                hidePopup();
            }
        });
        container.appendChild(popup);


        // use the popup event to show
        network.on("showPopup", function (params) {
            showPopup(params);
        });

        // use the hide event to hide it
        network.on("hidePopup", function (params) {
            hidePopup();
        });


        // hiding the popup through css
        function hidePopup() {
            popupTimeout = setTimeout(function () { popup.style.display = 'none'; }, 500);
        }

        // showing the popup
        function showPopup(nodeId) {
            // get the data from the vis.DataSet
            var nodeData = nodes.get([nodeId]);
            popup.innerHTML = nodeData[0].title;

            // get the position of the node
            var posCanvas = network.getPositions([nodeId])[nodeId];

            // get the bounding box of the node
            var boundingBox = network.getBoundingBox(nodeId);

            //position tooltip:
            posCanvas.x = posCanvas.x + 0.5 * (boundingBox.right - boundingBox.left);

            // convert coordinates to the DOM space
            var posDOM = network.canvasToDOM(posCanvas);

            // Give it an offset
            posDOM.x += 10;
            posDOM.y -= 20;

            // show and place the tooltip.
            popup.style.display = 'block';
            popup.style.top = posDOM.y + 'px';
            popup.style.left = posDOM.x + 'px';
        }
        


        

        return network;

    }

    drawGraph();

</script>
</body>
</html>
