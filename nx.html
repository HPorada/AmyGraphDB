rations.\u003c/p\u003e\n        \u003c/div\u003e \n    \u003c/div\u003e"}, {"color": "#ffe124", "group": 2, "id": "interactionsE/20", "label": "int:20(NI)", "shape": "diamond", "size": 10, "title": "\n    \u003cdiv class=\"tooltip-wrap\"\u003e\n        \u003cdiv class=\"tooltip-content\"\u003e\n            \u003cp\u003eh\u03b1Syn 0,2 \u03bcM monomers/seeds/fibrils / hIAPP monomers (2 \u03bcM) \n\nTogether, these data provide evidence that h\u03b1Syn and hIAPP monomers dose-dependently and bi-directionally cross-seed and co-aggregate into hybrid amyloid fibrils at concentrations of \u03b1Syn monomer of 7 \u03bcM or higher, whereas seeds and fibrils are less potent at crossseeding IAPP monomer fibril formation and growth at equimolar concentrations.\u003c/p\u003e\n        \u003c/div\u003e \n    \u003c/div\u003e"}, {"color": "#0bd11f", "group": 2, "id": "interactionsE/61", "label": "int:61(Y)", "shape": "triangle", "size": 10, "title": "\n    \u003cdiv class=\"tooltip-wrap\"\u003e\n        \u003cdiv class=\"tooltip-content\"\u003e\n            \u003cp\u003enan\u003c/p\u003e\n        \u003c/div\u003e \n    \u003c/div\u003e"}, {"color": "#ffe124", "group": 2, "id": "interactionsE/63", "label": "int:63(NI)", "shape": "diamond", "size": 10, "title": "\n    \u003cdiv class=\"tooltip-wrap\"\u003e\n        \u003cdiv class=\"tooltip-content\"\u003e\n            \u003cp\u003eQ4A mutant of GNNQQNY - a short fragment from yeast prion protein Sup35 as interactor\u003c/p\u003e\n        \u003c/div\u003e \n    \u003c/div\u003e"}, {"color": "#0bd11f", "group": 2, "id": "interactionsE/71", "label": "int:71(NI)", "shape": "triangle", "size": 10, "title": "\n    \u003cdiv class=\"tooltip-wrap\"\u003e\n        \u003cdiv class=\"tooltip-content\"\u003e\n            \u003cp\u003eAdding GNNQQNY (15 \u03bcM) to preformed hIAPP (15 \u03bcM)  seeds formed at different aggregation stage. Here, addition of GNNQQNY to 5 h (lag phase) hIAPP seeds\u003c/p\u003e\n        \u003c/div\u003e \n    \u003c
